name: Deploy WordPress Theme and Plugin to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HOSTINGER_SSH_HOST: 92.113.28.250
      HOSTINGER_SSH_USER: u710255073
      HOSTINGER_SSH_PORT: 65002
      HOSTINGER_WP_PATH: /home/u710255073/domains/aitomic.net/public_html

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check HOSTINGER_SSH_KEY secret
        run: test -n "$HOSTINGER_SSH_KEY"
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$HOSTINGER_SSH_KEY" > ~/.ssh/hostinger_key
          chmod 600 ~/.ssh/hostinger_key
          ssh-keyscan -p "$HOSTINGER_SSH_PORT" "$HOSTINGER_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Validate private key format
        run: ssh-keygen -y -f ~/.ssh/hostinger_key > /dev/null

      - name: Test Hostinger connection
        run: |
          ssh -i ~/.ssh/hostinger_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$HOSTINGER_SSH_PORT" \
            "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST" \
            "test -d '$HOSTINGER_WP_PATH' && echo 'Hostinger WordPress path found'"

      - name: Deploy Global Opportunities plugin
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/hostinger_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $HOSTINGER_SSH_PORT" \
            wordpress/wp-content/plugins/global-opportunities/ \
            "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST:$HOSTINGER_WP_PATH/wp-content/plugins/global-opportunities/"

      - name: Deploy Global Opportunities theme
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/hostinger_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p $HOSTINGER_SSH_PORT" \
            wordpress/wp-content/themes/global-opportunities-theme/ \
            "$HOSTINGER_SSH_USER@$HOSTINGER_SSH_HOST:$HOSTINGER_WP_PATH/wp-content/themes/global-opportunities-theme/"
